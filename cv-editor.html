<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Editor</title>
<style>
:root {
  --bg: #f0f0ec; --fg: #111; --muted: #444; --faint: #888;
  --rule: #ccc; --panel: #fff; --input-bg: #fff;
  --accent: #2d4a6b; --success: #1a7a4a;
  --nav: 210px;
}
[data-theme="dark"] {
  --bg: #16181b; --fg: #e0e8ef; --muted: #a8bfcc; --faint: #6a8090;
  --rule: #2a3038; --panel: #1e2226; --input-bg: #16181b;
  --accent: #7aafd4; --success: #3dbf7a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; font-size: var(--base, 15px); line-height: 1.5; color: var(--fg); background: var(--bg); }
.layout { display: grid; grid-template-columns: var(--nav) 1fr; min-height: 100vh; }

/* Sidebar */
.sidebar { background: var(--panel); border-right: 0.5px solid var(--rule); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-top { padding: 1rem; border-bottom: 0.5px solid var(--rule); }
.sidebar-top h1 { font-weight: 500; color: var(--muted); margin-bottom: 0.75rem; }
.file-btn { display: block; width: 100%; padding: 7px; background: var(--accent); color: #fff; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 0.4rem; }
.file-btn:hover { opacity: 0.88; }
input[type=file] { display: none; }
.load-status { font-size: 0.8em; color: var(--faint); }
.load-status.ok { color: var(--success); }
.load-status.err { color: #d00; }
.sidebar-nav { flex: 1; padding: 0.5rem 0; }
.nav-sep { height: 0.5px; background: var(--rule); margin: 0.4rem 0; }
.nav-item { display: block; padding: 5px 1rem; color: var(--muted); cursor: pointer; border: none; background: none; text-align: left; width: 100%; border-left: 2px solid transparent; }
.nav-item:hover { color: var(--fg); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); }
.sidebar-bottom { padding: 1rem; border-top: 0.5px solid var(--rule); display: flex; gap: 0.5rem; flex-direction: column; }
.action-btn { padding: 7px; border-radius: 5px; border: 0.5px solid var(--rule); background: var(--panel); color: var(--fg); cursor: pointer; }
.action-btn:hover { border-color: var(--muted); }
.action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.action-btn:disabled { opacity: 0.35; pointer-events: none; }
.theme-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
.theme-btn { font-size: 0.8em; background: none; border: none; color: var(--faint); cursor: pointer; padding: 0; }
.size-controls { display: flex; align-items: center; gap: 4px; }
.size-btn { font-size: 0.8em; background: none; border: 0.5px solid var(--rule); border-radius: 3px; color: var(--faint); cursor: pointer; padding: 1px 6px; line-height: 1.4; }
.size-btn:hover { color: var(--fg); border-color: var(--muted); }

/* Main */
.main { padding: 2rem; }

/* Section panel */
.section-panel { display: none; }
.section-panel.active { display: block; }
.section-heading { font-size: 0.75em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); margin-bottom: 1.25rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--rule); }

/* Entry list */
.entry-row { display: flex; align-items: baseline; gap: 0.75rem; padding: 0.55rem 0.65rem; border-bottom: 0.5px solid var(--rule); cursor: pointer; margin: 0 -0.65rem; border-radius: 4px; }
.entry-row:hover { background: var(--panel); }
.entry-row:hover .entry-actions { opacity: 1; }
.entry-yr { font-size: 0.8em; color: var(--faint); white-space: nowrap; min-width: 7rem; flex-shrink: 0; font-family: monospace; }
.entry-preview { color: var(--fg); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 400; }
.entry-actions { opacity: 0; display: flex; gap: 4px; flex-shrink: 0; transition: opacity 0.1s; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--faint); font-size: 0.85em; padding: 0 3px; line-height: 1; }
.icon-btn:hover { color: var(--fg); }
.icon-btn.del:hover { color: #c00; }

/* Inline edit form */
.entry-form { display: none; background: var(--panel); border: 0.5px solid var(--rule); border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; padding: 1rem 1rem 1rem 1.25rem; margin: 0.25rem 0 0.75rem; }
.entry-form.open { display: block; }
.field { margin-bottom: 0.85rem; }
.field label { display: block; font-size: 0.78em; font-weight: 600; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.02em; }
input, textarea, select { font-family: inherit; color: var(--fg); background: var(--input-bg); border: 0.5px solid var(--rule); border-radius: 4px; padding: 6px 8px; width: 100%; }
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
textarea { resize: vertical; min-height: 60px; }
textarea.mono { font-family: monospace; font-size: 0.85em; }
.field-row { display: grid; gap: 0.75rem; }
.field-row.r2 { grid-template-columns: 1fr 1fr; }
.field-row.r4 { grid-template-columns: 2fr 60px 60px 90px; }
.field-row.r3 { grid-template-columns: 2fr 1fr 1fr; }

/* Authors */
.chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 5px; min-height: 28px; }
.chip { display: inline-flex; align-items: center; gap: 4px; background: var(--bg); border: 0.5px solid var(--rule); border-radius: 100px; padding: 2px 8px; font-size: 0.85em; color: var(--muted); }
.chip.me { border-color: var(--accent); color: var(--accent); }
.chip-x { background: none; border: none; cursor: pointer; color: var(--faint); font-size: 0.85em; padding: 0; line-height: 1; }
.add-author { display: grid; grid-template-columns: 1fr auto auto; gap: 5px; align-items: center; }
.me-label { display: flex; align-items: center; gap: 4px; font-size: 0.85em; color: var(--muted); cursor: pointer; white-space: nowrap; }
input[type=checkbox] { width: auto; }

/* Links */
.link-row { display: grid; grid-template-columns: 100px 1fr auto; gap: 5px; align-items: center; margin-bottom: 5px; }
.rm-btn { background: none; border: none; cursor: pointer; color: #c00; font-size: 1em; line-height: 1; padding: 0 2px; }
.add-btn { font-size: 0.85em; color: var(--faint); background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; }
.add-btn:hover { color: var(--fg); }

/* Context note */
.cn-section { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 0.5px solid var(--rule); }
.cn-section label { font-size: 0.78em; color: var(--muted); display: block; margin-bottom: 3px; }

/* Fetch */
.fetch-bar { display: grid; grid-template-columns: 1fr auto; gap: 6px; margin-bottom: 1rem; }
.fetch-msg { font-size: 0.8em; color: var(--faint); margin-bottom: 0.5rem; min-height: 1rem; }
.fetch-msg.ok { color: var(--success); }
.fetch-msg.err { color: #d00; }

/* Form actions */
.form-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 0.5px solid var(--rule); }
.save-btn { padding: 6px 14px; background: var(--success); color: #fff; border: none; border-radius: 4px; cursor: pointer; }

/* Add new */
.add-new { margin-top: 1.5rem; }
.add-new summary { font-size: 0.85em; color: var(--muted); cursor: pointer; padding: 0.5rem 0; }
.add-new summary:hover { color: var(--fg); }
.add-new[open] summary { color: var(--accent); }
.add-new .inner { padding-top: 0.75rem; }

/* People panel */
.person-card { border: 0.5px solid var(--rule); border-radius: 5px; margin-bottom: 0.5rem; background: var(--panel); overflow: hidden; }
.person-card-head { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; cursor: pointer; }
.person-card-head:hover { background: var(--bg); }
.person-key { font-family: monospace; font-size: 0.78em; color: var(--faint); flex-shrink: 0; }
.person-name { font-weight: 500; flex: 1; }
.person-badges { display: flex; gap: 3px; }
.person-badge { font-size: 0.7em; padding: 1px 5px; border-radius: 3px; background: var(--bg); color: var(--faint); border: 0.5px solid var(--rule); }
.person-badge.me { background: var(--accent); color: #fff; border-color: var(--accent); }
.person-body { display: none; padding: 0.75rem; border-top: 0.5px solid var(--rule); background: var(--bg); }
.person-body.open { display: block; }
.person-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
.warning-box { background: #fff8e1; border: 0.5px solid #f0c040; border-radius: 4px; padding: 0.5rem 0.75rem; font-size: 0.85em; color: #7a5f00; margin-bottom: 0.75rem; }
[data-theme="dark"] .warning-box { background: #2a2200; border-color: #6a5000; color: #f0c040; }
.merge-panel { background: var(--panel); border: 0.5px solid var(--rule); border-radius: 5px; padding: 1rem; margin-top: 1rem; }
.merge-conflict { margin-bottom: 0.75rem; padding: 0.6rem; background: var(--bg); border-radius: 4px; border: 0.5px solid var(--rule); }
.merge-conflict-label { font-size: 0.78em; font-weight: 600; color: var(--muted); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.04em; }
.merge-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
.merge-opt { display: flex; align-items: flex-start; gap: 6px; font-size: 0.9em; cursor: pointer; padding: 4px; border-radius: 3px; }
.merge-opt:hover { background: var(--rule); }
.display-toggles { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--rule); }
.toggle-pill { display: flex; align-items: center; gap: 5px; font-size: 0.85em; cursor: pointer; padding: 4px 10px; border: 0.5px solid var(--rule); border-radius: 100px; }
.toggle-pill.on { border-color: var(--accent); color: var(--accent); }
.search-bar { margin-bottom: 1rem; }

/* Compact mode */
body.compact .field { margin-bottom: 0.45rem; }
body.compact .entry-row { padding: 0.3rem 0.65rem; }
body.compact .entry-form { padding: 0.65rem 0.75rem 0.65rem 1rem; }
body.compact .context-card { padding: 0.5rem; margin-bottom: 0.4rem; }
body.compact .misc-group { margin-bottom: 0.75rem; }
body.compact .add-new summary { padding: 0.3rem 0; }
body.compact input, body.compact textarea, body.compact select { padding: 4px 7px; }
.misc-group { margin-bottom: 1.5rem; }
.misc-group h3 { font-size: 0.8em; font-weight: 600; color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.06em; }
.context-card { border: 0.5px solid var(--rule); border-left: 3px solid var(--accent); border-radius: 0 5px 5px 0; padding: 0.75rem; margin-bottom: 0.75rem; background: var(--panel); }
.context-card-head { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 0.5px solid var(--rule); }
.context-key { font-family: monospace; font-size: 0.85em; color: var(--accent); font-weight: 600; flex: 1; }
.lang-row { display: grid; grid-template-columns: 130px 1fr auto; gap: 5px; align-items: center; margin-bottom: 5px; }
</style>
</head>
<body>
<div class="layout">

<aside class="sidebar">
  <div class="sidebar-top">
    <div class="theme-row">
      <div class="size-controls">
        <button class="size-btn" id="size-down">A−</button>
        <button class="size-btn" id="size-up">A+</button>
        <button class="size-btn" id="size-compact" title="Toggle compact/comfortable layout">⊡</button>
      </div>
      <button class="theme-btn" id="theme-btn">Dark</button>
    </div>
    <h1>CV Editor</h1>
    <label class="file-btn" for="file-input">Load cv.html</label>
    <input type="file" id="file-input" accept=".html">
    <div id="load-status" class="load-status">No file loaded.</div>
  </div>

  <div style="padding:0.5rem 1rem 0;border-bottom:0.5px solid var(--rule)">
    <input id="nav-search" placeholder="Search sections…" style="width:100%;font-size:0.85em;padding:4px 8px;border:0.5px solid var(--rule);border-radius:4px;background:var(--bg);color:var(--fg)">
  </div>
  <nav class="sidebar-nav" id="sidebar-nav">
    <button class="nav-item" data-section="position">Position</button>
    <button class="nav-item" data-section="education">Education</button>
    <div class="nav-sep"></div>
    <button class="nav-item" data-section="articles">Journal Articles</button>
    <button class="nav-item" data-section="book">Book Contributions</button>
    <button class="nav-item" data-section="proceedings">Conference Proceedings</button>
    <button class="nav-item" data-section="theses">Theses</button>
    <button class="nav-item" data-section="software">Software</button>
    <button class="nav-item" data-section="datasets">Datasets</button>
    <button class="nav-item" data-section="initiatives">Other Open Initiatives</button>
    <div class="nav-sep"></div>
    <button class="nav-item" data-section="grants">Grants & Fellowships</button>
    <button class="nav-item" data-section="awards">Awards & Honours</button>
    <div class="nav-sep"></div>
    <button class="nav-item" data-section="ta">Teaching Assistant</button>
    <button class="nav-item" data-section="workshops">Workshops & Short Courses</button>
    <div class="nav-sep"></div>
    <button class="nav-item" data-section="invited">Invited Presentations</button>
    <button class="nav-item" data-section="conference">Conference Presentations</button>
    <div class="nav-sep"></div>
    <button class="nav-item" data-section="leadership">Community Leadership</button>
    <button class="nav-item" data-section="committees">Committees</button>
    <button class="nav-item" data-section="organizing">Conference & Panel Organizer</button>
    <button class="nav-item" data-section="interestGroups">Interest Groups</button>
    <div class="nav-sep"></div>
    <button class="nav-item" data-section="misc">Reviewer, Certifications & Languages</button>
    <button class="nav-item" data-section="outreach">Outreach</button>
    <div class="nav-sep"></div>
    <button class="nav-item" data-section="people">People</button>
    <button class="nav-item" data-section="contextnotes">Context Notes</button>
  </nav>

  <div class="sidebar-bottom">
    <button class="action-btn primary" id="download-btn" disabled>Download cv.html</button>
  </div>
</aside>

<main class="main">
  <div id="sections"></div>
</main>
</div>

<datalist id="year-dl">
  <option value="In progress">
  <option value="In review">
  <option value="Submitted">
  <option value="Forthcoming">
</datalist>
<datalist id="link-type-dl">
  <option value="doi"><option value="preprint"><option value="postprint">
  <option value="github"><option value="slides"><option value="website"><option value="hdl"><option value="bib">
</datalist>
<datalist id="author-dl"></datalist>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let CV = null, source = '';
let knownAuthors = [];
const chipRefreshers = new Set(); // registry of open form chip refresh functions

const SECTIONS = {
  position:       { path: ['position'],                    form: 'simple' },
  education:      { path: ['education'],                   form: 'simple' },
  articles:       { path: ['publications','articles'],     form: 'article' },
  book:           { path: ['publications','book'],         form: 'book' },
  proceedings:    { path: ['publications','proceedings'],  form: 'proceedings' },
  theses:         { path: ['publications','theses'],       form: 'thesis' },
  software:       { path: ['softwareData','software'],     form: 'software' },
  datasets:       { path: ['softwareData','datasets'],     form: 'dataset' },
  initiatives:    { path: ['softwareData','initiatives'],  form: 'simple' },
  grants:         { path: ['grantsAwards','grants'],       form: 'simple' },
  awards:         { path: ['grantsAwards','awards'],       form: 'simple' },
  ta:             { path: ['teaching','ta'],               form: 'simple' },
  workshops:      { path: ['teaching','workshops'],        form: 'simple' },
  invited:        { path: ['presentations','invited'],     form: 'talk' },
  conference:     { path: ['presentations','conference'],  form: 'talk', poster: true },
  leadership:     { path: ['service','leadership'],        form: 'simple' },
  committees:     { path: ['service','committees'],        form: 'simple' },
  organizing:     { path: ['service','organizing'],        form: 'simple' },
  interestGroups: { path: ['service','interestGroups'],    form: 'simple' },
  people:         { path: null, form: 'people' },
  outreach:       { path: ['outreach'],               form: 'simple' },
  misc:           { path: null, form: 'misc' },
  contextnotes:   { path: null, form: 'contextnotes' }
};
const PUB = new Set(['article','book','proceedings','thesis','software','dataset']);
const TALK = new Set(['talk']);

function getSection(id) {
  const p = SECTIONS[id].path; if (!p||!CV) return null;
  return p.reduce((o,k)=>o&&o[k], CV);
}
function setSection(id, val) {
  const p = SECTIONS[id].path; if (!p) return;
  let o=CV; for (let i=0;i<p.length-1;i++) o=o[p[i]];
  o[p[p.length-1]]=val; dirty();
}
function dirty() {
  document.getElementById('download-btn').disabled=false;
  document.getElementById('preview-btn').disabled=false;
}

// ── File load ─────────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    source=ev.target.result;
    try {
      CV=extractCV(source);
      collectAuthors();
      renderSections();
      document.getElementById('load-status').textContent=`✓ ${f.name}`;
      document.getElementById('load-status').className='load-status ok';
      document.getElementById('download-btn').disabled=false;
      activate('position');
    } catch(err) {
      document.getElementById('load-status').textContent=`✗ ${err.message}`;
      document.getElementById('load-status').className='load-status err';
    }
  };
  r.readAsText(f);
});

function extractCV(src) {
  const s=src.indexOf('const CV = {'), e=src.indexOf('}; // end CV');
  if(s<0||e<0) throw new Error('CV object not found');
  const obj=src.slice(s+'const CV = '.length, e+1);
  try { return JSON.parse(obj); } catch(_) { return eval('('+obj+')'); }
}
function injectCV(src, cv) {
  const s=src.indexOf('const CV = {'), e=src.indexOf('}; // end CV')+'}; // end CV'.length;
  return src.slice(0,s)+'const CV = '+JSON.stringify(cv,null,2)+'; // end CV'+src.slice(e);
}
function collectAuthors() {
  // Update author datalist from people roster
  const dl=document.getElementById('author-dl'); dl.innerHTML='';
  Object.entries(CV.people||{}).forEach(([key,p])=>{
    const o=document.createElement('option');
    o.value=key;
    o.dataset.label=renderPersonName(p,'full');
    o.textContent=renderPersonName(p,'full')+' ['+key+']';
    dl.appendChild(o);
  });
}

function renderPersonName(p, style) {
  if (!p) return '?';
  const f=p.family||'', g=p.given||'';
  if (!f && !g) return p.name||'?';
  if (style==='lastfirst') return g ? f+', '+g : f;
  if (style==='firstlast') return g ? g+' '+f : f;
  if (style==='initials') return g ? f+', '+g.split(/\s+/).map(w=>w[0]?w[0]+'.':'').join(' ') : f;
  return g ? g+' '+f : f; // default: first last
}

function personDisplay(key) {
  const p=(CV.people||{})[key];
  return p ? renderPersonName(p,'lastfirst') : key;
}

// Fuzzy match: returns keys of similar existing people
function findSimilarPeople(family, given) {
  if (!family) return [];
  const fl=family.toLowerCase();
  return Object.entries(CV.people||{}).filter(([k,p])=>{
    if (!p.family) return false;
    const pf=p.family.toLowerCase();
    if (pf===fl) return true;
    // Levenshtein distance ≤ 2
    if (Math.abs(pf.length-fl.length)>2) return false;
    let d=0, i=0, j=0;
    while(i<pf.length&&j<fl.length){if(pf[i]!==fl[j])d++;i++;j++;}
    return d<=2;
  }).map(([k])=>k);
}

function makePersonKey(family, given) {
  const f=(family||'').toLowerCase().replace(/[^a-z]/g,'');
  const g=(given||'').split(/\s+/).map(w=>w[0]||'').join('').toLowerCase();
  let key=f+g||'unknown';
  // Ensure unique
  if ((CV.people||{})[key]) {
    let i=2; while((CV.people||{})[key+i])i++; key=key+i;
  }
  return key;
}

function addPersonToRoster(family, given) {
  if (!CV.people) CV.people={};
  const key=makePersonKey(family, given);
  CV.people[key]={family, given};
  dirty(); collectAuthors();
  return key;
}

function parseNameString(s) {
  if (!s) return {family:'',given:''};
  if (s.includes(', ')) {
    const [f,...g]=s.split(', ');
    return {family:f.trim(), given:g.join(', ').trim()};
  }
  const parts=s.trim().split(/\s+/);
  if (parts.length===1) return {family:parts[0],given:''};
  return {family:parts[parts.length-1], given:parts.slice(0,-1).join(' ')};
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function renderSections() {
  const c=document.getElementById('sections'); c.innerHTML='';
  Object.keys(SECTIONS).forEach(id=>{
    const p=document.createElement('div'); p.className='section-panel'; p.id='panel-'+id;
    p.appendChild(id==='misc'?buildMiscPanel():id==='contextnotes'?buildContextNotesPanel():id==='people'?buildPeoplePanel():buildSectionPanel(id));
    c.appendChild(p);
  });
  document.querySelectorAll('.nav-item[data-section]').forEach(b=>{
    b.addEventListener('click',()=>activate(b.dataset.section));
  });
}

function activate(id) {
  document.querySelectorAll('.section-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id)?.classList.add('active');
  document.querySelector(`.nav-item[data-section="${id}"]`)?.classList.add('active');
}

function buildSectionPanel(id) {
  const {form,poster} = SECTIONS[id];
  const frag = document.createDocumentFragment();
  const h = document.createElement('div'); h.className='section-heading';
  h.textContent = document.querySelector(`.nav-item[data-section="${id}"]`)?.textContent||id;
  frag.appendChild(h);

  // Entry list
  const list = document.createElement('div'); list.id='list-'+id;
  (getSection(id)||[]).forEach((e,i)=>list.appendChild(entryRow(id,e,i,form,poster)));
  frag.appendChild(list);

  // Add new
  const det = document.createElement('details'); det.className='add-new';
  const sum = document.createElement('summary'); sum.textContent='+ Add entry'; det.appendChild(sum);
  const inner = document.createElement('div'); inner.className='inner';

  if(PUB.has(form)) {
    const fb=document.createElement('div'); fb.className='fetch-bar';
    const fi=document.createElement('input'); fi.placeholder='DOI, handle.net URL, or article URL';
    const fm=document.createElement('div'); fm.className='fetch-msg';
    const ff=document.createElement('button'); ff.className='action-btn'; ff.textContent='Fetch';
    ff.onclick=()=>doFetch(fi.value,fm,formWrap,id,form,poster,updated=>{
      const arr=getSection(id)||[]; arr.push(updated); setSection(id,arr); refresh(id); activate(id);
    });
    fi.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();ff.click();}});
    fb.append(fi,ff); inner.append(fb,fm);
  }

  const formWrap=document.createElement('div');
  buildEntryForm(formWrap,{},id,form,poster,updated=>{
    const arr=getSection(id)||[]; arr.push(updated); setSection(id,arr); refresh(id); activate(id); det.open=false;
  });
  inner.appendChild(formWrap); det.appendChild(inner); frag.appendChild(det);
  return frag;
}

function entryRow(sid, entry, idx, form, poster) {
  const wrap = document.createElement('div');
  const row = document.createElement('div'); row.className='entry-row';
  const yr = document.createElement('span'); yr.className='entry-yr';
  yr.textContent=[entry.year,entry.month].filter(v=>v&&v!=='undefined').join(' ');
  const prev = document.createElement('span'); prev.className='entry-preview';
  let prevText = '';
  if(entry.authors?.length) {
    const firstKey=entry.authors[0];
    const firstP=(typeof firstKey==='string')?(CV&&CV.people&&CV.people[firstKey])||{}:{};
    const firstName=firstP.family?firstP.family+(firstP.given?', '+firstP.given:''):firstKey;
    prevText=firstName+' — '+(entry.title||entry.content||'').replace(/<[^>]+>/g,'');
  } else {
    prevText=(entry.content||entry.title||'').replace(/<[^>]+>/g,'');
  }
  prev.textContent=prevText;
  const acts = document.createElement('div'); acts.className='entry-actions';
  const editBtn=btn('✎','icon-btn',()=>toggleForm(formEl,sid,idx,form,poster));
  const upBtn=btn('↑','icon-btn',()=>move(sid,idx,-1));
  const dnBtn=btn('↓','icon-btn',()=>move(sid,idx,1));
  const delBtn=btn('✕','icon-btn del',()=>del(sid,idx));
  acts.append(editBtn,upBtn,dnBtn,delBtn);
  row.append(yr,prev,acts);
  row.onclick=e=>{if(!e.target.closest('.icon-btn'))toggleForm(formEl,sid,idx,form,poster);};
  const formEl=document.createElement('div'); formEl.className='entry-form';
  wrap.append(row,formEl);
  return wrap;
}

function toggleForm(formEl, sid, idx, form, poster) {
  if(formEl.classList.contains('open')){formEl.classList.remove('open');return;}
  formEl.innerHTML='';
  const entry=(getSection(sid)||[])[idx];
  buildEntryForm(formEl,entry,sid,form,poster,updated=>{
    const arr=getSection(sid); arr[idx]=updated; setSection(sid,arr); refresh(sid);
  });
  formEl.classList.add('open');
}

function move(sid,idx,dir) {
  const arr=getSection(sid); const ni=idx+dir;
  if(ni<0||ni>=arr.length) return;
  [arr[idx],arr[ni]]=[arr[ni],arr[idx]]; setSection(sid,arr); refresh(sid);
}
function del(sid,idx) {
  if(!confirm('Delete?')) return;
  const arr=getSection(sid); arr.splice(idx,1); setSection(sid,arr); refresh(sid);
}
function refresh(sid) {
  const panel=document.getElementById('panel-'+sid); panel.innerHTML='';
  panel.appendChild(sid==='misc'?buildMiscPanel():sid==='contextnotes'?buildContextNotesPanel():sid==='people'?buildPeoplePanel():buildSectionPanel(sid));
}

function btn(text,cls,fn) {
  const b=document.createElement('button'); b.className=cls; b.textContent=text;
  b.onclick=e=>{e.stopPropagation();fn();}; return b;
}

// ── Entry form ────────────────────────────────────────────────────────────────
function buildEntryForm(wrap, entry, sid, form, hasPoster, onSave) {
  entry=entry||{};
  const field=(label,el)=>{const f=document.createElement('div');f.className='field';const l=document.createElement('label');l.textContent=label;f.append(l,el);return f;};
  const inp=(val,ph,list)=>{const i=document.createElement('input');i.value=val||'';i.placeholder=ph||'';if(list)i.setAttribute('list',list);return i;};
  const ta=(val,mono)=>{const t=document.createElement('textarea');if(mono)t.className='mono';t.value=val||'';return t;};
  const row=(...cols)=>{const r=document.createElement('div');r.className='field-row '+cols.map(()=>'').join('');return r;};

  // Year / Month
  const yrRow=document.createElement('div'); yrRow.className='field-row r2';
  const yrIn=inp(entry.year,'Year or status','year-dl');
  const moIn=inp(entry.month,'Month (optional)');
  yrRow.append(field('Year / Status',yrIn),field('Month',moIn));
  wrap.appendChild(yrRow);

  let authState=(entry.authors||[]).map(a=>{
    if(typeof a==='string') return (CV.people||{})[a]?a:null; // only keep valid keys
    if(a&&a.name){const {family,given}=parseNameString(a.name);if(family)return addPersonToRoster(family,given);}
    return null;
  }).filter(Boolean);
  let linksState=(entry.links||[]).map(l=>({...l}));
  let vFields={}, titleIn, contentIn, descIn, citeIn, absIn, bibIn, posterChk;
  let autoGen=null;
  // corrSel declared outside if(PUB) so save handler can access it
  const corrRow=document.createElement('div'); corrRow.className='field';
  const corrL=document.createElement('label'); corrL.textContent='Corresponding author (optional)'; corrRow.appendChild(corrL);
  const corrSel=document.createElement('select');
  const corrNone=document.createElement('option'); corrNone.value=''; corrNone.textContent='None'; corrSel.appendChild(corrNone);

  if(PUB.has(form)) {
    function refreshCorrSel(){
      const cur=corrSel.value;
      while(corrSel.options.length>1) corrSel.remove(1);
      authState.forEach(k=>{const p=(CV.people||{})[k]||{};const o=document.createElement('option');o.value=k;o.textContent=renderPersonName(p,'lastfirst');corrSel.appendChild(o);});
      if(cur) corrSel.value=cur;
    }

    // Authors
    const authField=document.createElement('div'); authField.className='field';
    const authLabel=document.createElement('label'); authLabel.textContent='Authors'; authField.appendChild(authLabel);
    const chips=document.createElement('div'); chips.className='chips'; authField.appendChild(chips);
    function refreshChips(){chips.innerHTML='';if(typeof refreshCorrSel==='function')refreshCorrSel();authState.forEach((key,i)=>{
      const p=(CV.people||{})[key]||{};
      const c=document.createElement('span');c.className='chip'+(p.me?' me':'');
      c.textContent=renderPersonName(p,'lastfirst');
      const up=document.createElement('button');up.className='chip-x';up.textContent='↑';up.title='Move up';
      up.onclick=(()=>{const _i=i;return ()=>{if(_i>0){const t=authState[_i];authState[_i]=authState[_i-1];authState[_i-1]=t;refreshChips();}};})();
      const dn=document.createElement('button');dn.className='chip-x';dn.textContent='↓';dn.title='Move down';
      dn.onclick=(()=>{const _i=i;return ()=>{if(_i<authState.length-1){const t=authState[_i];authState[_i]=authState[_i+1];authState[_i+1]=t;refreshChips();}};})();
      const x=document.createElement('button');x.className='chip-x';x.textContent='×';
      x.onclick=()=>{authState.splice(i,1);refreshChips();};
      c.append(up,dn,x);chips.appendChild(c);
    });}
    refreshChips();
    refreshChips._wrap=wrap; chipRefreshers.add(refreshChips);
    const addRow=document.createElement('div'); addRow.className='add-author';
    const nameIn=inp('','Name','author-dl');
    const addBtn=btn('Add ↵','action-btn',()=>{
      if(!nameIn.value.trim())return;
      const inputVal=nameIn.value.trim(); if(!inputVal)return;
      let key=inputVal;
      if(!(CV.people||{})[inputVal]){
        const {family,given}=parseNameString(inputVal);
        const similar=findSimilarPeople(family,given);
        if(similar.length){
          const names=similar.map(k=>personDisplay(k)).join(', ');
          if(!confirm('Similar person already exists: '+names+'\nAdd as new person anyway? Cancel to use existing (add their key manually).'))
            {nameIn.value='';return;}
        }
        key=addPersonToRoster(family,given);
      }
      if(!authState.includes(key)) authState.push(key);
      nameIn.value='';refreshChips();
    });
    nameIn.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addBtn.click();}});
    addRow.append(nameIn,addBtn); authField.appendChild(addRow);
    wrap.appendChild(authField);
    const existingCorr=authState.find(k=>(CV.people||{})[k]?.corresponding);
    corrSel.value=existingCorr||''; corrRow.appendChild(corrSel); wrap.appendChild(corrRow);
    titleIn=ta(form==='software'||form==='dataset'?(entry.content||entry.title||''):entry.title);
    wrap.appendChild(field('Title',titleIn));

    // Venue by form type
    if(form==='article') {
      const vr=document.createElement('div'); vr.className='field-row r4';
      const jIn=inp(entry.venue?.journal,'Journal'),volIn=inp(entry.venue?.volume,'Vol.'),issIn=inp(entry.venue?.issue,'Issue'),pgIn=inp(entry.venue?.pages,'Pages');
      vr.append(field('Journal',jIn),field('Vol.',volIn),field('Issue',issIn),field('Pages',pgIn));
      wrap.appendChild(vr); vFields={j:jIn,vol:volIn,iss:issIn,pg:pgIn};
    } else if(form==='book') {
      const btIn=ta(entry.venue?.booktitle||''); wrap.appendChild(field('Book title',btIn));
      const vr=document.createElement('div'); vr.className='field-row r3';
      const edIn=inp(entry.venue?.editor||'','','author-dl'),pubIn=inp(entry.venue?.publisher||''),locIn=inp(entry.venue?.location||'','Location');
      vr.append(field('Editor(s)',edIn),field('Publisher',pubIn),field('Location',locIn));
      wrap.appendChild(vr); vFields={bt:btIn,ed:edIn,pub:pubIn,loc:locIn};
    } else if(form==='proceedings') {
      const btIn=ta(entry.venue?.booktitle||''); wrap.appendChild(field('Proceedings title',btIn));
      const vr=document.createElement('div'); vr.className='field-row r3';
      const edIn=inp(entry.venue?.editor||'','','author-dl'),pubIn=inp(entry.venue?.publisher||''),locIn=inp(entry.venue?.location||'','Location');
      vr.append(field('Editor(s)',edIn),field('Publisher',pubIn),field('Location',locIn));
      wrap.appendChild(vr); vFields={bt:btIn,ed:edIn,pub:pubIn,loc:locIn};
    } else if(form==='thesis') {
      const vr=document.createElement('div'); vr.className='field-row r2';
      const typSel=document.createElement('select');
      [['phdthesis','PhD'],['mathesis',"Master's"]].forEach(([v,l])=>{const o=document.createElement('option');o.value=v;o.textContent=l;typSel.appendChild(o);});
      if(entry.venue?.type) typSel.value=entry.venue.type;
      const instIn=inp(entry.venue?.institution||''),supIn=inp(entry.venue?.supervisor||'','Supervisor');
      vr.append(field('Degree',typSel),field('Institution',instIn));
      wrap.appendChild(vr); wrap.appendChild(field('Supervisor',supIn)); vFields={typ:typSel,inst:instIn,sup:supIn};
    } else if(form==='software') {
      const verIn=inp(entry.version||'','e.g. 1.0.0'); wrap.appendChild(field('Version (optional)',verIn)); vFields={ver:verIn};
    } else if(form==='dataset') {
      const pubIn=inp(entry.venue?.publisher||'','e.g. Zenodo'); wrap.appendChild(field('Publisher / Repository',pubIn)); vFields={pub:pubIn};
    }

    if(hasPoster) {
      const pRow=document.createElement('label'); pRow.style.cssText='display:flex;align-items:center;gap:6px;cursor:pointer;margin:0.5rem 0';
      posterChk=document.createElement('input'); posterChk.type='checkbox'; posterChk.checked=!!entry.poster;
      pRow.append(posterChk,' Poster'); wrap.appendChild(pRow);
    }

    descIn=ta(entry.desc); wrap.appendChild(field('Description — appears as a subtitle below the entry',descIn));

    // Links
    wrap.appendChild(buildLinksField(linksState));

    // Citation / Abstract / BibLaTeX
    const autoMsg=document.createElement('div'); autoMsg.style.cssText='font-size:0.8em;color:var(--faint);margin:0.5rem 0';
    autoMsg.textContent='Citation and BibLaTeX auto-generated. Edit to override.'; wrap.appendChild(autoMsg);
    citeIn=ta(entry.cite); wrap.appendChild(field('Citation (Chicago)',citeIn));
    absIn=ta(entry.abstract); wrap.appendChild(field('Abstract',absIn));
    bibIn=ta(entry.bib,true); wrap.appendChild(field('BibLaTeX',bibIn));

    autoGen=()=>{
      const e={authors:authState,title:titleIn.value,year:yrIn.value,
        venue:vFields.j?{journal:vFields.j.value,volume:vFields.vol.value,issue:vFields.iss.value,pages:vFields.pg.value}:
              vFields.bt?{booktitle:vFields.bt.value,editor:vFields.ed?.value,publisher:vFields.pub?.value}:
              vFields.inst?{type:vFields.typ?.value,institution:vFields.inst.value}:{}};
      const doi=linksState.find(l=>l.type==='doi')?.url?.replace(/^https?:\/\/doi\.org\//,'');
      if(!citeIn.dataset.manual) citeIn.value=genCite(e,doi);
      if(!bibIn.dataset.manual) bibIn.value=genBib(e,doi);
    };
    [yrIn,titleIn].forEach(el=>el.addEventListener('input',autoGen));
    citeIn.addEventListener('input',()=>citeIn.dataset.manual='1');
    bibIn.addEventListener('input',()=>bibIn.dataset.manual='1');

  } else if(TALK.has(form)) {
    // Authors optional for talks
    const authField=document.createElement('div'); authField.className='field';
    const authLabel=document.createElement('label'); authLabel.textContent='Authors (optional)'; authField.appendChild(authLabel);
    const chips=document.createElement('div'); chips.className='chips'; authField.appendChild(chips);
    function refreshChips2(){chips.innerHTML='';authState.forEach((key,i)=>{
      const p=(CV.people||{})[key]||{};
      const c=document.createElement('span');c.className='chip'+(p.me?' me':'');
      c.textContent=renderPersonName(p,'lastfirst');
      const up=document.createElement('button');up.className='chip-x';up.textContent='↑';
      up.onclick=(()=>{const _i=i;return ()=>{if(_i>0){const t=authState[_i];authState[_i]=authState[_i-1];authState[_i-1]=t;refreshChips2();}};})();
      const dn=document.createElement('button');dn.className='chip-x';dn.textContent='↓';
      dn.onclick=(()=>{const _i=i;return ()=>{if(_i<authState.length-1){const t=authState[_i];authState[_i]=authState[_i+1];authState[_i+1]=t;refreshChips2();}};})();
      const x=document.createElement('button');x.className='chip-x';x.textContent='×';
      x.onclick=()=>{authState.splice(i,1);refreshChips2();};
      c.append(up,dn,x);chips.appendChild(c);
    });}
    refreshChips2();
    const addRow=document.createElement('div'); addRow.className='add-author';
    const nameIn=inp('','Name','author-dl');
    const addBtn=btn('Add ↵','action-btn',()=>{
      const inputVal=nameIn.value.trim(); if(!inputVal)return;
      let key=inputVal;
      if(!(CV.people||{})[inputVal]){
        const {family,given}=parseNameString(inputVal);
        const similar=findSimilarPeople(family,given);
        if(similar.length){
          const names=similar.map(k=>personDisplay(k)).join(', ');
          if(!confirm('Similar person already exists: '+names+'\nAdd as new person anyway?')){nameIn.value='';return;}
        }
        key=addPersonToRoster(family,given);
        if(meChk.checked){CV.people[key].me=true;dirty();}
      }
      if(!authState.includes(key)) authState.push(key);
      nameIn.value='';meChk.checked=false;refreshChips2();
    });
    nameIn.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addBtn.click();}});
    addRow.append(nameIn,addBtn); authField.appendChild(addRow); wrap.appendChild(authField);
    titleIn=ta(entry.title); wrap.appendChild(field('Title',titleIn));
    const venIn=inp(entry.venue||'','Conference / event name and location'); wrap.appendChild(field('Venue',venIn)); vFields={ven:venIn};
    if(hasPoster){
      const pRow=document.createElement('label'); pRow.style.cssText='display:flex;align-items:center;gap:6px;cursor:pointer;margin:0.5rem 0';
      posterChk=document.createElement('input'); posterChk.type='checkbox'; posterChk.checked=!!entry.poster;
      pRow.append(posterChk,' Poster'); wrap.appendChild(pRow);
    }
    wrap.appendChild(buildLinksField(linksState));
  } else {
    contentIn=ta(entry.content); contentIn.style.minHeight='44px'; wrap.appendChild(field('Text',contentIn));
    descIn=ta(entry.desc); wrap.appendChild(field('Description — appears as a subtitle below the entry',descIn));
    wrap.appendChild(buildLinksField(linksState));
  }

  // Context note
  const cnSec=document.createElement('div'); cnSec.className='cn-section';
  const cnLabel=document.createElement('label'); cnLabel.textContent='Context note'; cnSec.appendChild(cnLabel);
  const cnSel=document.createElement('select');
  const none=document.createElement('option'); none.value=''; none.textContent='None'; cnSel.appendChild(none);
  Object.entries(CV.notes||{}).forEach(([k,n])=>{const o=document.createElement('option');o.value=k;o.textContent=n.title;cnSel.appendChild(o);});
  cnSel.value=entry.note||''; cnSec.appendChild(cnSel);
  const cnTxt=ta(entry.noteText||''); cnTxt.placeholder='How this entry relates to the project (optional)'; cnTxt.style.marginTop='5px'; cnSec.appendChild(cnTxt);
  wrap.appendChild(cnSec);

  // Save
  const saveBtn=btn('Save','save-btn',()=>{
    if(autoGen) autoGen();
    const updated={year:yrIn.value.trim(),links:linksState.filter(l=>l.url)};
    if(moIn.value.trim()) updated.month=moIn.value.trim();
    if(cnSel.value){updated.note=cnSel.value;if(cnTxt.value.trim())updated.noteText=cnTxt.value.trim();}
    if(PUB.has(form)){
      updated.authors=[...authState];
      // Update corresponding author flag in people
      authState.forEach(k=>{if(CV.people[k])CV.people[k].corresponding=false;});
      if(corrSel&&corrSel.value&&CV.people[corrSel.value]) CV.people[corrSel.value].corresponding=true;
      if(form==='software'||form==='dataset') updated.content=titleIn.value.trim();
      else updated.title=titleIn.value.trim();
      if(form==='article') updated.venue={journal:vFields.j.value,volume:vFields.vol.value,issue:vFields.iss.value,pages:vFields.pg.value};
      else if(form==='book'||form==='proceedings') updated.venue={booktitle:vFields.bt.value,editor:vFields.ed?.value,publisher:vFields.pub?.value,location:vFields.loc?.value};
      else if(form==='thesis') updated.venue={type:vFields.typ.value,institution:vFields.inst.value,supervisor:vFields.sup.value};
      else if(form==='software'&&vFields.ver?.value.trim()) updated.version=vFields.ver.value.trim();
      else if(form==='dataset') updated.venue={publisher:vFields.pub?.value};
      else updated.venue={};
      if(hasPoster&&posterChk?.checked) updated.poster=true;
      if(descIn?.value.trim()) updated.desc=descIn.value.trim();
      if(citeIn?.value.trim()) updated.cite=citeIn.value.trim();
      if(absIn?.value.trim()) updated.abstract=absIn.value.trim();
      if(bibIn?.value.trim()) updated.bib=bibIn.value.trim();
    } else if(TALK.has(form)){
      if(authState.length) updated.authors=[...authState];
      if(titleIn?.value.trim()) updated.title=titleIn.value.trim();
      if(vFields.ven?.value.trim()) updated.venue=vFields.ven.value.trim();
      if(hasPoster&&posterChk?.checked) updated.poster=true;
    } else {
      if(contentIn?.value.trim()) updated.content=contentIn.value.trim();
      if(descIn?.value.trim()) updated.desc=descIn.value.trim();
    }
    onSave(updated);
  });
  const fa=document.createElement('div'); fa.className='form-actions'; fa.appendChild(saveBtn);
  wrap.appendChild(fa);
}

function buildLinksField(state) {
  const LINK_TYPES = ['doi','preprint','postprint','github','slides','website','hdl','bib'];
  const f=document.createElement('div'); f.className='field';
  const l=document.createElement('label'); l.textContent='Links'; f.appendChild(l);
  const wrap=document.createElement('div');
  function refresh(){
    wrap.innerHTML='';
    state.forEach((lk,i)=>{
      const r=document.createElement('div'); r.className='link-row';
      // Type select
      const tSel=document.createElement('select');
      [...LINK_TYPES,'custom'].forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;tSel.appendChild(o);});
      const inferredType=lk.type||inferType(lk.url)||'website';
      tSel.value=LINK_TYPES.includes(inferredType)?inferredType:'custom';
      state[i].type=tSel.value;
      tSel.onchange=()=>{state[i].type=tSel.value;};
      const uIn=document.createElement('input'); uIn.value=lk.url||''; uIn.placeholder='URL';
      uIn.oninput=()=>{state[i].url=uIn.value;if(!lk.type){const t=inferType(uIn.value);if(t&&LINK_TYPES.includes(t)){tSel.value=t;state[i].type=t;}}};
      const rm=document.createElement('button'); rm.className='rm-btn'; rm.textContent='×';
      rm.onclick=()=>{state.splice(i,1);refresh();};
      r.append(tSel,uIn,rm); wrap.appendChild(r);
    });
  }
  refresh(); f.appendChild(wrap);
  const add=document.createElement('button'); add.className='add-btn'; add.textContent='+ add link';
  add.onclick=()=>{state.push({type:'website',url:''});refresh();}; f.appendChild(add);
  return f;
}

function inferType(url) {
  if(!url) return '';
  if(url.includes('doi.org')) return 'doi';
  if(url.includes('github.com')) return 'github';
  if(url.includes('hdl.handle.net')) return 'hdl';
  if(/preprint/i.test(url)) return 'preprint';
  if(/slides?/i.test(url)) return 'slides';
  return 'website';
}

// ── Misc panel ────────────────────────────────────────────────────────────────
function buildMiscPanel() {
  const frag=document.createDocumentFragment();

  // Reviewer / Certifications

  // Languages
  const lg=document.createElement('div'); lg.className='misc-group';
  const lh=document.createElement('h3'); lh.textContent='Languages'; lg.appendChild(lh);
  const lw=document.createElement('div');
  function refreshLang(){
    lw.innerHTML='';

  const body=document.createElement('div'); body.className='person-body'; card.appendChild(body);

    ['affiliation','Affiliation',p.affiliation||''],['orcid','ORCID',p.orcid||''],

      CV.people[key][fkey]=inp.value;

function countRefs(key) {
  let n=0;

  Object.values(CV.publications||{}).forEach(scan);
  Object.values(CV.presentations||{}).forEach(scan);
  return n;
}

function showMergePanel(keyA, container, onRefresh) {
  // Remove existing merge panel if any
  container.querySelector('.merge-panel')?.remove();
  const panel=document.createElement('div'); panel.className='merge-panel';
  const h=document.createElement('div'); h.style.cssText='font-weight:600;margin-bottom:0.75rem';

  Object.entries(CV.people||{}).filter(([k])=>k!==keyA).sort((a,b)=>a[1].family?.localeCompare(b[1].family||'')).forEach(([k,p])=>{

    const conflicts=[];
    FIELDS.forEach(f=>{
      if(pA[f]&&pB[f]&&pA[f]!==pB[f]) conflicts.push(f);
    });
    if(conflicts.length){
      const ch=document.createElement('div'); ch.style.cssText='font-weight:600;margin:0.75rem 0 0.5rem;';
      ch.textContent=conflicts.length+' conflict'+(conflicts.length>1?'s':'')+' — choose a value for each:'; conflictArea.appendChild(ch);
      conflicts.forEach(f=>{
        const block=document.createElement('div'); block.className='merge-conflict';
        const lbl=document.createElement('div'); lbl.className='merge-conflict-label'; lbl.textContent=f; block.appendChild(lbl);
        const opts=document.createElement('div'); opts.className='merge-opts';
        [[keyA,pA[f]],[keyB,pB[f]]].forEach(([k,val])=>{
          const opt=document.createElement('label'); opt.className='merge-opt';
          const radio=document.createElement('input'); radio.type='radio'; radio.name='merge-'+f; radio.value=k; radio.checked=k===keyB;
          opt.append(radio,val); opts.appendChild(opt);
        });
        // Custom option
        const custOpt=document.createElement('label'); custOpt.className='merge-opt'; custOpt.style.gridColumn='1/-1';
        const custRadio=document.createElement('input'); custRadio.type='radio'; custRadio.name='merge-'+f; custRadio.value='__custom__';
        const custIn=document.createElement('input'); custIn.placeholder='Custom value…'; custIn.style.cssText='flex:1;margin-left:4px';
        custIn.onfocus=()=>{custRadio.checked=true;};
        custOpt.append(custRadio,'Custom: ',custIn); opts.appendChild(custOpt);
        block.appendChild(opts);
        conflictArea.appendChild(block);
        block.dataset.field=f;
      });
    } else {
      const ok=document.createElement('div'); ok.style.cssText='color:var(--success);font-size:0.9em;margin:0.5rem 0';
      ok.textContent='No field conflicts — safe to merge.'; conflictArea.appendChild(ok);
    }

    const commitBtn=btn('Commit merge','action-btn primary',()=>{
      const kb=targetSel.value; if(!kb)return;
      const pA=CV.people[keyA], pB=CV.people[kb]; if(!pA||!pB)return;
      // Resolve fields
      const FIELDS=['family','given','affiliation','orcid','email','url','me'];
      FIELDS.forEach(f=>{
        const block=conflictArea.querySelector('[data-field="'+f+'"]');
        if(block){
          const sel=block.querySelector('input[type=radio]:checked');
          if(sel){
            if(sel.value==='__custom__'){
              const cv2=block.querySelector('input[placeholder="Custom value…"]');
              CV.people[kb][f]=cv2?cv2.value:pB[f];
            } else {
              CV.people[kb][f]=CV.people[sel.value][f];
            }
          }
        } else {
          if(!pB[f]&&pA[f]) CV.people[kb][f]=pA[f];
        }
      });
      function remap(arr){(arr||[]).forEach(e=>{if(Array.isArray(e.authors))e.authors=e.authors.map(k=>k===keyA?kb:k);});}
      Object.values(CV.publications||{}).forEach(remap);
      Object.values(CV.presentations||{}).forEach(remap);
      delete CV.people[keyA];
      dirty(); onRefresh();
    });
    conflictArea.appendChild(commitBtn);
  };

  const cancelBtn=btn('Cancel','action-btn',()=>panel.remove());
  panel.appendChild(cancelBtn);
  container.appendChild(panel);
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function doFetch(input,stEl,formWrap,sid,form,poster,onSave) {
  input=input.trim(); if(!input)return;
  stEl.textContent='Fetching…'; stEl.className='fetch-msg';
  try {
    const data=await fetchMeta(input);
    stEl.textContent='✓ Fields populated.'; stEl.className='fetch-msg ok';
    formWrap.innerHTML='';
    buildEntryForm(formWrap,data,sid,form,poster,onSave);
  } catch(e) { stEl.textContent='Error: '+e.message; stEl.className='fetch-msg err'; }
}

async function fetchMeta(input) {
  let doi=input.replace(/^https?:\/\/doi\.org\//i,'').replace(/^doi:/i,'').trim();
  if(input.includes('hdl.handle.net')) {
    const id=input.replace(/^https?:\/\/hdl\.handle\.net\//,'');
    const d=await scrape(`https://hdl.handle.net/${id}`);
    d.links=[{type:'hdl',url:`https://hdl.handle.net/${id}`,label:id},...(d.links||[])]; return d;
  }
  if(doi.startsWith('10.')) {
    const r=await fetch(`https://api.crossref.org/works/${encodeURIComponent(doi)}`);
    if(!r.ok) throw new Error(`Crossref HTTP ${r.status}`);
    return parseCrossref((await r.json()).message,doi);
  }
  if(input.startsWith('http')) return await scrape(input);
  throw new Error('Enter a DOI, handle.net URL, or article URL.');
}

async function scrape(url) {
  const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return parseMeta((await r.json()).contents||'',url);
}

function parseMeta(html,url) {
  const doc=new DOMParser().parseFromString(html,'text/html');
  const m=n=>{const e=doc.querySelector(`meta[name="${n}"],meta[property="${n}"]`);return e?e.getAttribute('content'):'';}
  const d={};
  d.title=(m('citation_title')||m('og:title')||doc.title||'').trim();
  if(d.title&&!d.title.endsWith('.')) d.title+='.';
  const ca=[...doc.querySelectorAll('meta[name="citation_author"]')].map(e=>e.content);
  if(ca.length) d.authors=ca.map((a,i)=>({name:i===0?a:a.split(',').reverse().map(s=>s.trim()).join(' ')}));
  const dt=m('citation_publication_date')||m('dc.date')||'';
  const ym=dt.match(/\d{4}/); if(ym) d.year=ym[0];
  const j=m('citation_journal_title');
  if(j){d.venue={journal:j};const v=m('citation_volume');if(v)d.venue.volume=v;const i=m('citation_issue');if(i)d.venue.issue=i;const fp=m('citation_firstpage'),lp=m('citation_lastpage');if(fp&&lp)d.venue.pages=`${fp}–${lp}`;}
  else d.venue={};
  const doi=m('citation_doi');
  d.links=doi?[{type:'doi',url:`https://doi.org/${doi}`,label:doi}]:[{type:'website',url,label:url}];
  const abs=m('citation_abstract')||m('og:description')||'';
  if(abs&&abs.length>50) d.abstract=abs.trim();
  if(d.authors&&d.year){d.cite=genCite(d,doi);d.bib=genBib(d,doi);}
  return d;
}

function parseCrossref(msg,doi) {
  const e={};
  const pub=msg.published||msg['published-print']||msg['published-online'];
  if(pub?.['date-parts']?.[0]) e.year=String(pub['date-parts'][0][0]);
  if(msg.author) e.authors=msg.author.map((a,i)=>({name:i===0?`${a.family||''}, ${a.given||''}`.trim().replace(/^,\s*|,\s*$/g,''):`${a.given||''} ${a.family||''}`.trim()}));
  if(msg.title?.[0]) e.title=msg.title[0].replace(/<[^>]+>/g,'')+'.';
  if(msg.type==='journal-article'){e.venue={journal:msg['container-title']?.[0]};if(msg.volume)e.venue.volume=msg.volume;if(msg.issue)e.venue.issue=msg.issue;if(msg.page)e.venue.pages=msg.page.replace('-','–');}
  else if(msg.type==='book-chapter'){e.venue={booktitle:msg['container-title']?.[0],publisher:msg.publisher};}
  else e.venue={};
  e.links=[{type:'doi',url:`https://doi.org/${doi}`,label:doi}];
  if(msg.abstract) e.abstract=msg.abstract.replace(/<[^>]+>/g,'').trim();
  e.cite=genCite(e,doi); e.bib=genBib(e,doi);
  return e;
}

function genCite(e,doi) {
  if(!e.authors||!e.year) return '';
  const auths=(e.authors||[]).map(k=>personDisplay(k)).join(', ');
  const v=e.venue||{}; let loc=v.journal||'';
  if(v.volume){loc+=` ${v.volume}`;if(v.issue)loc+=` (${v.issue})`;}
  if(v.pages) loc+=`: ${v.pages}`;
  return `${auths}. ${e.year}. "${(e.title||'').replace(/\.$/,'')}" ${loc}.${doi?' https://doi.org/'+doi+'.':''}`;
}

function genBib(e,doi) {
  if(!e.authors||!e.year) return '';
  const firstAuth=e.authors[0]; const firstP=(CV&&CV.people&&CV.people[firstAuth])||{};
  const key=((firstP.family||firstAuth||'').toLowerCase().replace(/[^a-z]/g,'')||'author')+e.year;
  const authBib=(e.authors||[]).map(k=>{
    const p=(CV&&CV.people&&CV.people[k])||{family:k,given:''};
    return p.given?p.family+', '+p.given:p.family;
  }).join(' and ');
  const v=e.venue||{}; let type='article';
  if(v.type==='phdthesis'||v.type==='mathesis') type='thesis';
  else if(v.booktitle) type='inproceedings';
  else if(!v.journal) type='misc';
  let b=`@${type}{${key},\n  author = {${authBib}},\n  title = {${(e.title||'').replace(/\.$/,'')}},\n`;
  if(type==='thesis'){b+=`  type = {${v.type}},\n`;if(v.institution)b+=`  institution = {${v.institution}},\n`;}
  if(v.journal) b+=`  journaltitle = {${v.journal}},\n`;
  if(v.booktitle) b+=`  booktitle = {${v.booktitle}},\n`;
  if(v.editor) b+=`  editor = {${v.editor}},\n`;
  if(v.publisher) b+=`  publisher = {${v.publisher}},\n`;
  if(v.location) b+=`  location = {${v.location}},\n`;
  b+=`  date = {${e.year}},\n`;
  if(v.volume) b+=`  volume = {${v.volume}},\n`;
  if(v.issue) b+=`  number = {${v.issue}},\n`;
  if(v.pages) b+=`  pages = {${v.pages.replace('–','--')}},\n`;
  if(doi) b+=`  doi = {${doi}},\n`;
  b=b.replace(/,\n$/,'\n'); b+='}'; return b;
}

      const match=!q||btn.textContent.toLowerCase().includes(q);
      btn.style.display=match?'':'none';
    });
    document.querySelectorAll('.nav-sep').forEach(sep=>{sep.style.display='';});
    if(q){
      document.querySelectorAll('.nav-item[data-section]').forEach(btn=>{
        if(btn.style.display==='none') return;
        btn.style.background='var(--accent)';btn.style.color='#fff';
        setTimeout(()=>{btn.style.background='';btn.style.color='';},600);
      });
      clearTimeout(searchTimer);
      searchTimer=setTimeout(()=>{
        inp.value='';
        document.querySelectorAll('.nav-item[data-section]').forEach(btn=>btn.style.display='');
      },1500);
    }
  });
})();

// ── Theme ─────────────────────────────────────────────────────────────────────
(()=>{
  const btn=document.getElementById('theme-btn');
  let dark=localStorage.getItem('editor-theme')==='dark'||(localStorage.getItem('editor-theme')===null&&window.matchMedia('(prefers-color-scheme: dark)').matches);
  const set=d=>{dark=d;document.body.setAttribute('data-theme',d?'dark':'light');document.body.style.colorScheme=d?'dark':'light';btn.textContent=d?'Light':'Dark';localStorage.setItem('editor-theme',d?'dark':'light');};
  set(dark); btn.addEventListener('click',()=>set(!dark));
})();

// ── Size & density ────────────────────────────────────────────────────────────
(()=>{
  const SIZES = ['13px','14px','15px','16px','17px','18px'];
  const NAVS  = ['180px','195px','210px','225px','240px','255px'];
  let si = parseInt(localStorage.getItem('editor-size')||'2');
  let compact = localStorage.getItem('editor-compact')==='1';

  function applySize() {
    document.documentElement.style.setProperty('--base', SIZES[si]);
    document.documentElement.style.setProperty('--nav', NAVS[si]);
    localStorage.setItem('editor-size', si);
  }
  function applyDensity() {
    document.body.classList.toggle('compact', compact);
    document.getElementById('size-compact').style.opacity = compact ? '1' : '0.5';
    localStorage.setItem('editor-compact', compact?'1':'0');
  }
  applySize(); applyDensity();

  document.getElementById('size-up').addEventListener('click',()=>{if(si<SIZES.length-1){si++;applySize();}});
  document.getElementById('size-down').addEventListener('click',()=>{if(si>0){si--;applySize();}});
  document.getElementById('size-compact').addEventListener('click',()=>{compact=!compact;applyDensity();});
})();
</script>
</body>
</html>
